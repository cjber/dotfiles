#-- Theme (Oxide) ----------------------------------------------
$base = rgb(121113)
$mantle = rgb(121212)
$crust = rgb(0a0a0a)
$surface0 = rgb(222222)
$surface1 = rgb(333333)
$surface2 = rgb(444444)
$overlay0 = rgb(555555)
$text = rgb(c1c1c1)
$subtext0 = rgb(999999)
$primary = rgb(e78a53)
$secondary = rgb(5f8787)
$tertiary = rgb(fbcb97)
$blue = rgb(5f8787)
$maroon = rgb(e78a53)
$hypr_border_size = 2
$hypr_gaps_in = 5
$hypr_gaps_out = 10
$hypr_rounding = 10

#-- NVIDIA Environment Variables (2025 Best Practices) --------
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = NVD_BACKEND,direct
env = GBM_BACKEND,nvidia-drm
env = __GL_VRR_ALLOWED,0
env = __GL_MaxFramesAllowed,1
env = VDPAU_DRIVER,nvidia
env = MOZ_ENABLE_WAYLAND,1
env = PROTON_ENABLE_NGX_UPDATER,1

env = XDG_SESSION_TYPE,wayland
env = QT_QPA_PLATFORMTHEME,qt6ct

# Legacy wlroots variable - not needed for Hyprland 0.51+
# env = WLR_NO_HARDWARE_CURSORS,1

env = HYPRCURSOR_THEME,Bibata-Modern-Ice
env = HYPRCURSOR_SIZE,24
env = XCURSOR_THEME,Bibata-Modern-Ice
env = XCURSOR_SIZE,24
env = GTK_THEME,Adwaita:dark

#-- Cursor (NVIDIA - Hyprland 0.46+) --------------------------
# Using use_cpu_buffer for better hardware cursor support (experimental)
# If you experience cursor issues, switch back to no_hardware_cursors = true
cursor {
	no_hardware_cursors = true
	enable_hyprcursor = true
}

#-- Hyprexpo ---------------------------------------------------
plugin {
	hyprexpo {
		columns = 3
		gap_size = 30
		bg_col = $crust
		workspace_method = center current
		skip_empty = true
		enable_gesture = false
	}
}

#-- General ----------------------------------------------------
general {
	border_size = $hypr_border_size
	gaps_in = $hypr_gaps_in
	gaps_out = $hypr_gaps_out
	col.active_border = $blue
	col.inactive_border = $surface0
	layout = master
	no_focus_fallback = false
	resize_on_border = false
	extend_border_grab_area = 15
	hover_icon_on_border = true
}

#-- Decoration -------------------------------------------------
decoration {
	rounding = $hypr_rounding
	active_opacity = 1.0
	inactive_opacity = 0.95
	fullscreen_opacity = 1.0
	dim_inactive = false
	dim_special = 0.2
	dim_around = 0.4

	shadow {
		enabled = true
		range = 20
		render_power = 3
		color = rgba(0a0a0a80)
		offset = 0 4
	}

	blur {
		enabled = true
		size = 6
		passes = 3
		new_optimizations = true
		xray = false
		noise = 0.02
		contrast = 1.0
		brightness = 0.9
		vibrancy = 0.2
		popups = true
	}
}

#-- Animations -------------------------------------------------
animations {
	enabled = true

	bezier = snappy, 0.2, 1.0, 0.3, 1.0
	bezier = smooth, 0.4, 0.0, 0.2, 1.0
	bezier = fade, 0.0, 0.0, 0.2, 1.0

	animation = windowsIn, 1, 4, snappy, popin 80%
	animation = windowsOut, 1, 4, snappy, popin 80%
	animation = windowsMove, 1, 4, smooth, slide
	animation = fadeIn, 1, 3, fade
	animation = fadeOut, 1, 3, fade
	animation = fadeSwitch, 1, 1, fade
	animation = fadeShadow, 1, 1, fade
	animation = fadeDim, 1, 1, fade
	animation = border, 1, 2, smooth
	animation = borderangle, 1, 8, smooth
	animation = workspaces, 1, 4, snappy, slide
	animation = specialWorkspace, 1, 4, snappy, fade
}

#-- Input: Keyboard, Mouse, Touchpad ---------------------------
input {
	kb_model =
	kb_layout =
	kb_variant =
	kb_options =
	kb_rules =
	kb_file = 
	numlock_by_default = false
	repeat_rate = 75
	repeat_delay = 400
	sensitivity = -.8
	accel_profile = on
	force_no_accel = false
	left_handed = false
	follow_mouse = 1
	mouse_refocus = true
	float_switch_override_focus = 1
	touchpad {
		disable_while_typing = true
		natural_scroll = false
		scroll_factor = 1.0
		middle_button_emulation = false
		tap_button_map = 
		clickfinger_behavior = false
		tap-to-click = true
		drag_lock = false
		tap-and-drag = true
	}
	touchdevice {
		transform = 0
		output = 
	}
}

# #-- Workspace Gestures -----------------------------------------
gestures {
	workspace_swipe_distance = 300
	workspace_swipe_invert = true
	workspace_swipe_min_speed_to_force = 30
	workspace_swipe_cancel_ratio = 0.5
	workspace_swipe_create_new = true
	workspace_swipe_forever = false
}

#--  ----------------------------------------------
misc {
  background_color = $mantle
	disable_hyprland_logo = true
	disable_splash_rendering = false
	vfr = on
	vrr = 0
	mouse_move_enables_dpms = true
	key_press_enables_dpms = true
	always_follow_on_dnd = true
	layers_hog_keyboard_focus = true
	animate_manual_resizes = true
	animate_mouse_windowdragging = true
	disable_autoreload = false
	enable_swallow = false
	swallow_regex = 
	swallow_exception_regex = 
	focus_on_activate = true
	mouse_move_focuses_monitor = true
	allow_session_lock_restore = false
	# render_titles_in_groupbar = false
	# groupbar_titles_font_size = 10
	# groupbar_gradients = false
	# groupbar_text_color = true
}

group {
  col.border_active = $maroon
  col.border_inactive = $surface0
  groupbar {
    font_family = JetBrainsMono Nerd Font Mono Bold
    text_color = $blue
    font_size = 10
    col.active = $surface0
    col.inactive = $base
    height = 20
  }
}

#-- Binds ------------------------------------------------------
binds {
	pass_mouse_when_bound = false
	scroll_event_delay = 300
	workspace_back_and_forth = true
	allow_workspace_cycles = false
	focus_preferred_method = 0
}

#-- Debug (Only for developers) --------------------------------
debug {
	overlay = false
	damage_blink = false
	disable_logs = false
	disable_time = true
	damage_tracking = 2
	enable_stdout_logs = false
	manual_crash = 0
}

#-- Output -----------------------------------------------------
monitor = DP-2,2560x1440@60,0x0,1,transform,1
monitor = DP-1,3440x1440@143.92,1440x560,1
monitor = HDMI-A-1, disable

#-- Workspace Rules --------------------------------------------
workspace = 1, monitor:DP-1, default:true
workspace = 2, monitor:DP-1
workspace = 3, monitor:DP-1
workspace = 4, monitor:DP-2, default:true, layoutopt:orientation:top, mfact:0.33
bind = SUPER, o, layoutmsg, mfact exact 0.60
bind = SUPER, o, layoutmsg, orientationcenter

bind = SUPER, i, layoutmsg, mfact exact 0.33
bind = SUPER, i, layoutmsg, orientationleft

#-- Layout : Master --------------------------------------------
master {
	allow_small_split = false
	# special_scale_factor = 0.8
	mfact = 0.33
	new_on_top = false
	orientation = center
  slave_count_for_center_master = 0
  # center_master_slaves_on_right = true
}


#-- Layer Rules ------------------------------------------------
layerrule = match:namespace waybar, blur on, ignore_alpha 0.5

#-- Window Rules -----------------------------------------------
#windowrule = float, yad|nm-connection-editor|pavucontrolk
#windowrule = float, title:File Operation Progress

#-- Keybindings ------------------------------------------------
#-- General --
#

# -- Terminal : kitty --
bind = SUPER,       Return, exec, kitty

# -- Apps --
bind = SUPER, semicolon, exec, google-chrome-stable

# -- Rofi --
bind  = SUPER, M,             exec, rofi -show drun
bind  = SUPER_SHIFT, O,       exec, rofi -show p -modi p:"rofi-power-menu"

# -- Function keys --
bind = ,XF86MonBrightnessUp,   exec, $backlight --inc
bind = ,XF86MonBrightnessDown, exec, $backlight --dec
bind = ,XF86AudioRaiseVolume,  exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
bind = ,XF86AudioLowerVolume,  exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
bind = ,XF86AudioMute,         exec, pactl set-sink-mute @DEFAULT_SINK@ toggle

# -- Hyprland --
bind = SUPER,       Q,      killactive,
bind = SUPER,       slash,      fullscreen, 0
bind = SUPER_SHIFT,       Return,  togglefloating,
bind = SUPER_SHIFT, P, exec, $HOME/.config/hypr/screenshot.sh
bind = SUPER, p, exec, hyprctl -j activewindow | jq -r '"\(.at[0]),\(.at[1]) \(.size[0])x\(.size[1])"' | grim -g - - | wl-copy --type image/png
bind = SUPER, c, exec, hyprpicker -a
bind = SUPER_SHIFT, R, exec, pkill wl-screenrec || wl-screenrec -f ~/Videos/recording-$(date +%Y%m%d-%H%M%S).mp4
# bind = SUPER, w, hyprexpo:expo, toggle

# Change Focus
bind = SUPER, h,  movefocus, l
bind = SUPER, l, movefocus, r
bind = SUPER, k,    movefocus, u
bind = SUPER, j,  movefocus, d
bind = SUPER, i,    moveintogroup, u
bind = SUPER, o,  moveoutofgroup, d
bind = SUPER, g,  togglegroup
bind = SUPER, n, changegroupactive

# Move Active
bind = SUPER_SHIFT, h,  movewindow, l
bind = SUPER_SHIFT, l, movewindow, r
bind = SUPER_SHIFT, k,    movewindow, u
bind = SUPER_SHIFT, j,  movewindow, d

# Switch between windows (hyprswitch)
bind = SUPER, Tab, exec, hyprswitch simple --sort-recent true
bind = SUPER_SHIFT, Tab, exec, hyprswitch simple --sort-recent true --reverse

# Workspaces (1-3 on DP-1, 4 on DP-2)
bind = SUPER, a, workspace, 1
bind = SUPER, s, workspace, 2
bind = SUPER, d, workspace, 3

# Send to Workspaces
bind = SUPER_SHIFT, a, movetoworkspace, 1
bind = SUPER_SHIFT, s, movetoworkspace, 2
bind = SUPER_SHIFT, d, movetoworkspace, 3


# Misc
bindl = ,switch:Lid Switch, exec, $lockscreen

# bind=SUPER, y, exec, ~/.config/hypr/scripts/hypr_mfact.sh
bind=SUPER,y,submap,resize

# will start a submap called "resize"
submap=resize

# sets repeatable binds for resizing the active window
binde=,l,resizeactive,200 0
binde=,h,resizeactive,-200 0
binde=,k,resizeactive,0 -50
binde=,j,resizeactive,0 50
binde=,r,layoutmsg, mfact exact 0.33

# use reset to go back to the global submap
bind=,escape,submap,reset 

submap=reset

# Power


#-- Mouse Buttons ----------------------------------------------
bindm=SUPER, mouse:272, movewindow
bindm=SUPER, mouse:273, resizewindow

#-- Startup ----------------------------------------------------
exec-once=waybar --config /home/cjber/.config/waybar/main.jsonc
exec-once=waybar --config /home/cjber/.config/waybar/side.jsonc

exec-once=mako # notifications
exec-once=wl-paste --watch cliphist store # clipboard manager
exec-once=udiskie & # USB auto-mount

# Auto-arrange 3 windows vertically on workspace 4
exec-once=/home/cjber/.config/hypr/auto_vertical_thirds.sh


#-- Idle -------------------------------------------------------
exec-once = hypridle
# exec-once=$HOME/.config/hypr/scripts/sleep.sh

#-- Screen Sharing ---------------------------------------------
exec-once=dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
# exec-once=$HOME?.config/hypr/scripts/nuke.sh

exec = gsettings set org.gnome.desktop.interface color-scheme "prefer-dark"
exec = gsettings set org.gnome.desktop.interface gtk-theme 'Adwaita-dark'
