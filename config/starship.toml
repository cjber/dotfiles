# Minimal prompt using the same restrained palette as Waybar.
# Deliberately uses plain ASCII text instead of icons or emoji.

add_newline = true
palette = "waybar"

format = """
$username$hostname$directory$git_branch$git_status$fill$cmd_duration$jobs$status
$character"""

[palettes.waybar]
base = "#121113"
surface = "#333333"
text = "#c1c1c1"
muted = "#777777"
orange = "#e78a53"
teal = "#5f8787"
cream = "#fbcb97"

[username]
show_always = false
style_user = "bold teal"
style_root = "bold orange"
format = "[$user]($style)"

[hostname]
ssh_only = true
style = "bold teal"
format = "[@$hostname]($style) "

[directory]
style = "bold orange"
read_only = " ro"
read_only_style = "orange"
truncation_length = 4
truncate_to_repo = false
format = "[$path]($style)[$read_only]($read_only_style) "

[git_branch]
symbol = "git:"
style = "teal"
format = "[$symbol$branch]($style)"

[git_status]
style = "muted"
format = "[ $all_status$ahead_behind]($style)"
conflicted = "!${count}"
ahead = "+${count}"
behind = "-${count}"
diverged = "+${ahead_count}/-${behind_count}"
untracked = "?${count}"
stashed = "*${count}"
modified = "~${count}"
staged = "+${count}"
renamed = ">${count}"
deleted = "x${count}"

[fill]
symbol = " "

[cmd_duration]
min_time = 1500
style = "muted"
format = "[took $duration]($style) "

[jobs]
symbol = "jobs:"
style = "cream"
format = "[$symbol$number]($style) "

[status]
disabled = false
symbol = "exit:"
style = "orange"
format = "[$symbol$status]($style) "

[character]
success_symbol = "[::](bold orange)"
error_symbol = "[::](bold orange)"
vimcmd_symbol = "[::](bold teal)"
vimcmd_replace_one_symbol = "[::](bold cream)"
vimcmd_replace_symbol = "[::](bold cream)"
vimcmd_visual_symbol = "[::](bold teal)"
